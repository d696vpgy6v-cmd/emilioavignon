<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emilio Avignon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { text-underline-offset: 1px; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Source Serif 4', serif;
      height: 100vh;
      overflow: hidden;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 22px 40px 0 40px;
      pointer-events: none;
    }
    header * { pointer-events: auto; }

    .site-name {
      font-size: 35px;
      font-weight: 400;
      text-decoration: none;
      color: #111;
    }

    .header-right {
      display: flex;
      align-items: baseline;
      gap: 28px;
    }
    .header-right .header-btns {
      display: flex;
      align-items: baseline;
      gap: 28px;
      margin-left: 85px;
    }

    .hbtn, #btn-draw, #btn-infos {
      font-family: 'Source Serif 4', serif;
      font-size: 18px;
      font-weight: 400;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 1px;
      padding: 0;
      transition: color 0.2s;
    }
    .hbtn { font-weight: 200; }
    .hbtn:hover, #btn-draw:hover, #btn-infos:hover { color: #111; }
    .hbtn.active, #btn-draw.active, #btn-infos.active { color: #111; font-style: italic; }

    #btn-close {
      display: none;
      font-family: 'Source Serif 4', serif;
      font-size: 22px;
      font-weight: 300;
      color: #111;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: opacity 0.2s;
    }
    #btn-close:hover { opacity: 0.4; }
    body.drawing-active #btn-close,
    body.infos-active   #btn-close { display: block; }
    body.drawing-active #lang-btn,
    body.infos-active   #lang-btn  { display: none; }
   
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      height: 100vh;
    }

    .img img, .img video { transition: filter 0.5s ease; }
    .layout.grayscale .img img,
    .layout.grayscale .img video { filter: grayscale(1); }

    .col-center {
      position: relative;
      overflow-y: scroll;
      scrollbar-width: none;
      padding: 100px 40px 80px 80px;
    }
    .col-center::-webkit-scrollbar { display: none; }

    #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .col-center.drawing { cursor: none; }
    .col-center.drawing #draw-canvas { pointer-events: auto; }

    #draw-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      transform: translate(-50%, -50%);
    }
    body.drawing-active #draw-cursor { display: block; }

    .project-block {
    position: relative;
    margin-bottom: 10px;
    }

    .project-block:not(:last-child)::after {
    content: "*";
    display: block;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 100px;
    font-weight: 100;
    color: #111;
    margin-top: 0px;
    line-height: 1;
    }

    .project-label { display: none; }

    .img { margin-bottom: 40px; }
    .img.gap-sm { margin-bottom: 16px; }
    .img.gap-lg { margin-bottom: 100px; }
    .img.gap-xl { margin-bottom: 160px; }

    .img.left   { margin-left: 0;    margin-right: auto; }
    .img.center { margin-left: auto; margin-right: auto; }
    .img.right  { margin-left: auto; margin-right: 0;   }

    .img img, .img video {
      width: 100%;
      display: block;
      object-fit: cover;
      background: #e8e4e0;
    }

    .img.w25  { width: 25%; } .img.w30  { width: 30%; }
    .img.w35  { width: 35%; } .img.w40  { width: 40%; }
    .img.w45  { width: 45%; } .img.w50  { width: 50%; }
    .img.w55  { width: 55%; } .img.w60  { width: 60%; }
    .img.w65  { width: 65%; } .img.w70  { width: 70%; }
    .img.w80  { width: 80%; } .img.w100 { width: 100%;}

    .img.r-sq  img, .img.r-sq  video { aspect-ratio: 1/1;  }
    .img.r-43  img, .img.r-43  video { aspect-ratio: 4/3;  }
    .img.r-32  img, .img.r-32  video { aspect-ratio: 3/2;  }
    .img.r-169 img, .img.r-169 video { aspect-ratio: 16/9; }
    .img.r-23  img, .img.r-23  video { aspect-ratio: 2/3;  }
    .img.r-50  img, .img.r-50  video { aspect-ratio: 1/2;  }

    .col-right {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow {
      position: absolute;
      left: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #888;
      font-size: 36px;
      line-height: 1;
      transition: color 0.2s, opacity 0.4s;
      font-family: 'Source Serif 4', serif;
    }
    .arrow:hover { color: #111; }
    .arrow.down { bottom: 28px; }
    .arrow.hidden { opacity: 0; pointer-events: none; }

    .project-desc, #infos-panel, #draw-panel {
      position: absolute;
      left: 0;
      width: 240px;
      top: 55%;
      transform: translateY(calc(-50% + 12px));
      opacity: 0;
      filter: blur(8px);
      pointer-events: none;
      transition: opacity 0.5s ease, filter 0.5s ease, transform 0.5s ease;
    }
    .project-desc.is-visible,
    #infos-panel.visible,
    #draw-panel.visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(-50%);
      pointer-events: auto;
    }
    .project-desc.draw-hidden {
      opacity: 0 !important;
      filter: blur(8px) !important;
      pointer-events: none !important;
      transform: translateY(calc(-50% + 12px)) !important;
    }

    .project-desc h3 { font-size: 25px; font-weight: 400; }
    .project-desc p, #infos-panel p {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      line-height: 1.3;
      color: #1f1f1f;
    }
    .project-desc u, #infos-panel u {
      text-decoration: underline;
      text-decoration-color: #888;
    }
    .project-desc .meta {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      color: #888;
      margin-bottom: 18px;
      line-height: 1.3;
    }
    #infos-panel .infos-contact { font-family: 'Source Sans 3', sans-serif; margin-top: 22px; }

    .tool-btn {
      font-family: 'Source Serif 4', serif;
      font-size: 18px;
      font-weight: 400;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 1px;
      padding: 0;
      display: block;
      margin-bottom: 10px;
      transition: color 0.2s;
    }
    .tool-btn:hover  { color: #111; }
    .tool-btn.active { color: #111; font-style: italic; }

    #shared-slider-wrap { margin-top: 20px; }
    #color-slider-wrap  { margin-top: 16px; }

    #color-slider {
      background: linear-gradient(to right,
        hsl(0,100%,45%), hsl(30,100%,45%), hsl(60,100%,45%),
        hsl(90,100%,45%), hsl(120,100%,45%), hsl(150,100%,45%),
        hsl(180,100%,45%), hsl(210,100%,45%), hsl(240,100%,45%),
        hsl(270,100%,45%), hsl(300,100%,45%), hsl(330,100%,45%),
        hsl(360,100%,45%)) !important;
      --thumb-color: hsl(0,100%,45%);
    }
    #color-slider::-webkit-slider-thumb { background: var(--thumb-color) !important; }
    #color-slider::-moz-range-thumb     { background: var(--thumb-color) !important; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 1px;
      background: #888;
      outline: none;
      cursor: pointer;
      margin: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.4); }
    input[type="range"]::-moz-range-thumb {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #000;
      border: none;
      cursor: pointer;
    }

    #btn-clear {
      display: block;
      margin-top: 28px;
      font-family: 'Source Serif 4', serif;
      font-size: 18px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 1px;
      padding: 0;
      transition: color 0.2s;
    }
    #btn-clear:hover { color: #e00; }

    #m-panel, #m-overlay { display: none; }

    /* ══════════════════════════════════════════════════
       MOBILE (≤ 768px)
    ══════════════════════════════════════════════════ */
@media (max-width: 768px) {

  body { height: 100dvh; overflow: hidden; }

  header {
    align-items: flex-start;
    padding: 16px 5px 16px 20px;
  }
 .site-name {
    font-size: 28px;
    width: min-content;
    line-height: 1.15;
    white-space: normal;
  }
  .header-right {
    gap: 16px;
    align-items: flex-start;
    padding-top: 2px;
    margin-left: auto;
  }
  .header-right .header-btns {
    margin-left: 0;
    gap: 16px;
    justify-content: flex-end;
  }
  #btn-draw, #btn-infos, .hbtn { font-size: 20px; color: #111; }

 /* ══ Header : pas de bouton langue sur mobile, croix selon état ══ */

  #btn-close { display: none !important; }

  body.infos-active #btn-infos { display: none !important; }
  body.infos-active #btn-close {
    display: inline-block !important;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 35px;
    color: #111;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-right: 12px;
    font-weight: 10;
  }
  #lang-btn { display: none !important; }
  body.infos-active #btn-infos,
  body.infos-active #btn-draw,
  body.drawing-active #btn-draw,
  body.drawing-active #btn-infos { display: none !important; }

  body.drawing-active #btn-draw { display: none !important; }
  body.drawing-active #btn-close {
    display: inline-block !important;
    font-size: 35px;
    color: #111;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-right: 12px;
    font-weight: 10;
  }


  .layout { grid-template-columns: 1fr; height: 100dvh; }
  .col-center { padding: 110px 16px 120px 16px; height: 100dvh; }
  .project-block { margin-bottom: 70px; }

  .img.w25,.img.w30,.img.w35,.img.w40,.img.w45,
  .img.w50,.img.w55,.img.w60,.img.w65,.img.w70,
  .img.w80,.img.w100 { width: 100%; }
  .img.left,.img.center,.img.right { margin-left:0; margin-right:0; }
  .img,.img.gap-sm,.img.gap-lg,.img.gap-xl { margin-bottom: 16px; }

  .col-right { display: none !important; }

  /* ── Panneau projet ── */
  #m-panel {
    display: block;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    z-index: 50;
    padding: 0 16px 12px 16px;
  }
  #m-titlebar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-top: 8px;
    cursor: pointer;
  }
  #m-title {
    font-family: 'Source Serif 4', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: #111;
    flex: 1;
    opacity: 0;
    filter: blur(4px);
    transform: translateY(4px);
    transition: opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease;
  }
  #m-title.visible { opacity: 1; filter: blur(0); transform: translateY(0); }
  #m-btn {
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    color: #111;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-left: 12px;
    flex-shrink: 0;
    line-height: 1;
  }
  #m-desc {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.45s ease, opacity 0.35s ease, padding-top 0.4s ease;
    padding-top: 0;
  }
  #m-panel.open #m-desc {
    max-height: 55vh;
    opacity: 1;
    padding-top: 14px;
    overflow-y: auto;
  }
  #m-desc .m-meta {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    color: #888;
    line-height: 1.35;
    margin-bottom: 10px;
  }
  #m-desc p {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    line-height: 1.35;
    color: #1f1f1f;
  }
  #m-desc p u { text-decoration: underline; text-decoration-color: #888; }

  /* ══ Overlay mobile (infos / dessin) ══ */
  #m-overlay {
    display: block;
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: #fff;
    z-index: 200;
    padding: 18px 20px 32px 20px;
    max-height: 80dvh;
    overflow-y: auto;
    transform: translateY(110%);
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -2px 20px rgba(0,0,0,0.07);
  }

  #m-overlay-content #infos-panel p {
  font-family: 'Source Sans 3', sans-serif;
}

  #m-overlay.visible { transform: translateY(0); }

  #m-overlay-topbar { display: none !important; }

  #m-overlay-content u { text-decoration: underline; text-decoration-color: #888; }
  #m-overlay-content .infos-contact { margin-top: 20px; }
  #m-overlay-content .infos-contact p { color: #111; }

  #m-overlay-content .tool-btn { font-size: 17px; margin-bottom: 0; }
  #m-overlay-content #btn-clear { font-size: 17px; margin: 0; }

  /* ══ DRAW PANEL en mobile : pinceau + gomme à gauche, tout effacer à droite ══ */
  #m-overlay-content #draw-panel {
    position: static;
    width: 100%;
    top: auto;
    left: auto;
    transform: none;
    opacity: 1;
    filter: none;
    pointer-events: auto;
    transition: none;

    display: grid;
    grid-template-columns: auto auto 1fr auto;
    grid-template-areas:
      "pen eraser . clear"
      "size size size size"
      "color color color color";
    align-items: center;
    column-gap: 18px;
    row-gap: 3px;
  }
  #m-overlay-content #draw-panel #tool-pen           { grid-area: pen;    margin-bottom: 10px; }
  #m-overlay-content #draw-panel #tool-eraser        { grid-area: eraser; margin-bottom: 10px; }
  #m-overlay-content #draw-panel #btn-clear          { grid-area: clear;  justify-self: end; margin-bottom: 10px; }
  #m-overlay-content #draw-panel #shared-slider-wrap { grid-area: size;   margin: 0; padding: 0; width: 100%; }
  #m-overlay-content #draw-panel #color-slider-wrap  { grid-area: color;  margin: 0; padding: 0; width: 100%; }
  #m-overlay-content #draw-panel input[type="range"] { width: 100%; }

  #draw-cursor { display: none !important; }
  .col-center.drawing { cursor: default; }

  /* Zone tactile élargie sur les sliders — mobile uniquement */
#m-overlay-content #draw-panel input[type="range"] {
  height: 36px;
  padding: 17px 0;                 /* 17 + 2 (ligne) + 17 = 36px */
  background-clip: content-box;
  -webkit-background-clip: content-box;
  box-sizing: border-box;
}

#m-overlay-content #draw-panel #color-slider {
  background-clip: content-box !important;
  -webkit-background-clip: content-box !important;
}
}
</style>
</head>


<body>

    <circle id="cursor-circle" cx="20" cy="20" r="8" fill="none" stroke="#111" stroke-width="1"/>
  </svg>

  <header>
    <a href="index.html" class="site-name">Emilio Avignon</a>
    <div class="header-right">
      <button id="btn-infos">infos</button>
      <button id="btn-draw">dessiner</button>
      <div class="header-btns">
        <button class="hbtn" id="lang-btn">en</button>
        <button id="btn-close">✕</button>
      </div>
    </div>
  </header>

  <div class="layout" id="main-layout">

    <main class="col-center" id="scroll-col">

      <section class="project-block" id="bontemps">
        <div class="project-label"><h2>Bontemps</h2></div>
        <div class="img w100 r-32 gap-lg">
          <video autoplay muted loop playsinline><source src="images/Bontemps-11.mp4" type="video/mp4"></video>
        </div>
        <div class="img w40 center gap-lg"><img src="images/Bontemps-2.webp" alt="Bontemps"></div>
        <div class="img w65 left"><img src="images/Bontemps-3.webp" alt="Bontemps"></div>
        <div class="img w40 right gap-lg"><img src="images/Bontemps-4.webp" alt="Bontemps"></div>
        <div class="img w65 center gap-lg"><img src="images/Bontemps-5.webp" alt="Bontemps"></div>
        <div class="img w40 left"><img src="images/Bontemps-6.webp" alt="Bontemps"></div>
        <div class="img w40 center"><img src="images/Bontemps-7.webp" alt="Bontemps"></div>
        <div class="img w40 right gap-lg"><img src="images/Bontemps-8.webp" alt="Bontemps"></div>

      <section class="project-block" id="affluences">

        <div class="img w65 center"><img src="images/Affluences-1.webp" alt="Affluences"></div>
        <div class="img w40 left gap-lg"><img src="images/Affluences-2.webp" alt="Affluences"></div>
        <div class="img w70 right r-sq">
          <video autoplay muted loop playsinline><source src="images/Affluences-7.mp4" type="video/mp4"></video>
        </div>
      </section>

      <section class="project-block" id="personne">
        <div class="project-label"><h2>Personne</h2></div>
        <div class="img w40 left"><img src="images/Personne-1.webp" alt="Personne"></div>
        <div class="img w80 right gap-lg"><img src="images/Personne-2.webp" alt="Personne"></div>
        <div class="img w45 left"><img src="images/Personne-3.webp" alt="Personne"></div>
        <div class="img w60 center"><img src="images/Personne-4.webp" alt="Personne"></div>
      </section>

      <section class="project-block" id="ramo">
        <div class="project-label"><h2>Ramo</h2></div>
        <div class="img w60 left gap-lg"><img src="images/Ramo-1.webp" alt="Ramo"></div>
        <div class="img w40 right"><img src="images/Ramo-3.webp" alt="Ramo"></div>
        <div class="img w100 r-32 center"><img src="images/Ramo-2.webp" alt="Ramo"></div>
        <div class="img w50 center"><img src="images/Ramo-6.webp" alt="Ramo"></div>

      <section class="project-block" id="claustra">
        <div class="project-label"><h2>Claustra</h2></div>
        <div class="img w45 left"><img src="images/Claustra-3.webp" alt="Claustra"></div>
        <div class="img w70 right"><img src="images/Claustra-2.webp" alt="Claustra"></div>
        <div class="img w50 left gap-lg"><img src="images/Claustra-4.webp" alt="Claustra"></div>
        <div class="img w40 center"><img src="images/Claustra-1.webp" alt="Claustra"></div>
      </section>

    </main>

    <aside class="col-right">
      <button class="arrow down" id="arrow-down">↓</button>

      <div class="project-desc intro is-visible" id="desc-intro"><p></p></div>
      <div class="project-desc" data-for="bontemps"><h3></h3><div class="meta"></div><p></p></div>
      <div class="project-desc" data-for="affluences"><h3></h3><p></p></div>
      <div class="project-desc" data-for="personne"><h3></h3><p></p></div>
      <div class="project-desc" data-for="ramo"><h3></h3><div class="meta"></div><p></p></div>
      <div class="project-desc" data-for="claustra"><h3></h3><div class="meta"></div><p></p></div>

      <div id="infos-panel">
        <p id="infos-bio"></p>
        <div class="infos-contact">
          <p>+33 6 52 54 91 24<br>emilioavignon@gmail.com<br>@emilioavignon</p>
        </div>
      </div>

      <div id="draw-panel">
        <button class="tool-btn active" id="tool-pen">pinceau</button>
        <button class="tool-btn" id="tool-eraser">gomme</button>
        <div id="shared-slider-wrap">
          <input type="range" id="size-slider" min="1" max="60" value="2">
        </div>
        <div id="color-slider-wrap">
          <input type="range" id="color-slider" min="0" max="360" value="0">
        </div>
        <button id="btn-clear">tout effacer</button>
      </div>
    </aside>
  </div>

  <!-- Panneau mobile projet -->
  <div id="m-panel">
    <div id="m-titlebar">
      <span id="m-title"></span>
      <button id="m-btn">↓</button>
    </div>
    <div id="m-desc"></div>
  </div>

  <!-- Overlay mobile infos / dessin -->
  <div id="m-overlay">
    <div id="m-overlay-topbar">
      <button id="m-overlay-close">✕</button>
    </div>
    <div id="m-overlay-content"></div>
  </div>

  <script>
    /* ══ TRADUCTIONS ══ */
    const translations = {
      intro: {
        fr: `Étudiant en design objet à l'<u>École nationale supérieure des arts décoratifs de Paris (EnsAD)</u>, je suis passionné de <u>dessin</u>. Au-delà d'un simple outil de représentation, mes recherches graphiques participent à une méthodologie qui fait naître les volumes, précise les formes et révèle les potentialités de la matière. Ces productions sont motivées par une recherche de <u>poésie</u>, voire de <u>narration</u>, à travers les compositions, les formes et les couleurs des objets que j'imagine. Le design devient ainsi le lieu où se rencontrent l'<u>intuition et la rigueur</u>, où chaque ligne contribue à <u>donner vie à la matière.</u>`,
        en: `A product design student at the <u>École nationale supérieure des arts décoratifs in Paris (EnsAD)</u>, I am passionate about <u>drawing</u>. Beyond a simple tool of representation, my graphic research contributes to a methodology that gives birth to volumes, refines forms and reveals the potential of materials. This work is driven by a search for <u>poetry</u>, even <u>narrative</u>, through the compositions, forms and colours of the objects I imagine. Design thus becomes the place where <u>intuition and rigour</u> meet, where every line contributes to <u>bringing matter to life.</u>`
      },
      bontemps: {
        title: 'Bontemps',
        meta: { fr: 'Collaboration avec Marius Gauge<br>Partenariat avec Escalier Décor', en: 'Collaboration with Marius Gauge<br>Partnership with Escalier Décor' },
        fr: `Ce projet, réalisé pour la société Escalier Décor, est une tentative de trouver de <u>nouvelles utilisations aux rampes d'escalier</u>. Notre objectif est de transformer l'escalier d'un simple passage à un endroit où <u>suspendre un vêtement, ranger ses clés ou étendre une serviette</u>. Dans un deuxième temps, nous concevons un <u>valet de nuit</u> qui reprend le système structurel de la rampe. Bontemps était le nom du premier valet de Louis XIV.`,
        en: `This project, created for Escalier Décor, is an attempt to find <u>new uses for stair railings</u>. Our goal is to transform the staircase from a simple passageway into a place to <u>hang a coat, store keys or drape a towel</u>. In a second phase, we designed a <u>valet stand</u> that draws on the structural system of the railing. Bontemps was the name of Louis XIV's first valet.`
      },
      affluences: {
        title: 'Affluences', meta: { fr: '', en: '' },
        fr: `Quand <u>les corps grouillent</u>, le mouvement de chacun participe au mouvement de tous. Ainsi, la foule est un objet malléable, qui <u>se forme et se déforme</u>, qui se ceint et s'échappe. C'est cette dynamique qui caractérise mon <u>motif</u>. Un changement de perspective ou le mouvement d'une lumière fait vibrer le bas-relief, donnant aux formes un <u>semblant de vie.</u><br>La foule garde parfois les secrets les plus intimes.`,
        en: `When <u>bodies swarm</u>, each person's movement contributes to the movement of all. The crowd becomes a malleable object, one that <u>forms and deforms</u>, tightens and escapes. This dynamic is what defines my <u>pattern</u>. A shift in perspective or the movement of light makes the bas-relief vibrate, giving the forms a <u>semblance of life.</u><br>A crowd sometimes keeps the most intimate secrets.`
      },
      personne: {
        title: 'Personne', meta: { fr: '', en: '' },
        fr: `Dans le cadre d'une recherche sur les objets qui <u>simulent la vie</u>, la marionnette se tient en équilibre <u>entre la chose et le sujet</u>. Elle devient un <u>double</u> de celui ou celle qui la tient mais exprime par des gestes maladroits <u>sa propre mélancolie.</u>`,
        en: `As part of a research project on objects that <u>simulate life</u>, the puppet balances <u>between thing and subject</u>. It becomes a <u>double</u> of the person who holds it, yet expresses through clumsy gestures <u>its own melancholy.</u>`
      },
      ramo: {
        title: 'Ramo',
        meta: { fr: 'Collaboration avec Georges Laaraman', en: 'Collaboration with Georges Laaraman' },
        fr: `<u>Le liège</u> que l'on utilise au quotidien comporte un paradoxe : c'est une matière naturelle par sa provenance, mais transformée dans son usage. Pour cette raison, on peine souvent à en apprécier la sensualité. C'est pour ramener <u>la poésie du chêne brut</u>, avec son bois, son écorce, ses couleurs, que nous avons produit ce design évocateur.`,
        en: `<u>Cork</u> as we use it in everyday life carries a paradox: natural by origin, transformed in use. To restore <u>the poetry of raw cork oak</u> — its wood, bark and colours — we created this evocative design.`
      },
      claustra: {
        title: 'Claustra',
        meta: { fr: 'Collaboration avec Marius Gauge<br>Partenariat avec Varian', en: 'Collaboration with Marius Gauge<br>Partnership with Varian' },
        fr: `Translucide et rythmée, cette <u>cloison</u> se déploie et se superpose, créant un effet de <u>moirage</u>. Les dizaines de modules du rideau se <u>déforment</u> pour accentuer l'illusion. <u>L'objet prend forme à travers ce qu'il révèle du paysage.</u>`,
        en: `Translucent and rhythmic, this <u>partition</u> unfolds and overlaps, creating a <u>moiré effect</u>. The dozens of modules <u>deform</u> to heighten the illusion. <u>The object takes shape through what it reveals of the landscape.</u>`
      }
    };

    let lang = 'fr';
    window.lang = lang;

    const isMobile = () => window.innerWidth <= 768;

    function renderDesc(key) {
      const t = translations[key];
      const desc = document.querySelector(key === 'intro' ? '#desc-intro' : `.project-desc[data-for="${key}"]`);
      if (!desc) return;
      if (key === 'intro') { desc.querySelector('p').innerHTML = t[lang]; return; }
      desc.querySelector('h3').textContent = t.title;
      const meta = desc.querySelector('.meta');
      if (meta) meta.innerHTML = t.meta[lang];
      desc.querySelector('p').innerHTML = t[lang];
    }
    function applyLang() {
      Object.keys(translations).forEach(renderDesc);
      document.getElementById('lang-btn').textContent = lang === 'fr' ? 'en' : 'fr';
      document.documentElement.lang = lang;
      document.getElementById('infos-bio').innerHTML = translations.intro[lang];
    }
    applyLang();
    document.getElementById('lang-btn').addEventListener('click', () => {
      lang = lang === 'fr' ? 'en' : 'fr';
      window.lang = lang;
      applyLang();
      /* Met à jour l'overlay si ouvert */
      if (mOverlay.classList.contains('visible') && infosMode) {
        document.querySelector('#m-overlay-content p') &&
          (document.querySelector('#m-overlay-content').firstChild.innerHTML = translations.intro[lang]);
      }
    });

    /* ══ SCROLL ══ */
    const scrollCol  = document.getElementById('scroll-col');
    const blocks     = Array.from(document.querySelectorAll('.project-block'));
    const descs      = document.querySelectorAll('.project-desc');
    const intro      = document.getElementById('desc-intro');
    const arrowDown  = document.getElementById('arrow-down');
    let activeIndex  = -1, introGone = false;

    function showDesc(id) {
      descs.forEach(d => d.classList.remove('is-visible'));
      const t = document.querySelector(`.project-desc[data-for="${id}"]`);
      if (t) t.classList.add('is-visible');
    }
    function getActiveIndex() {
      const triggerY = scrollCol.getBoundingClientRect().top + scrollCol.clientHeight * 0.35;
      let best = -1;
      for (let i = 0; i < blocks.length; i++) {
        if (blocks[i].getBoundingClientRect().top <= triggerY) best = i;
      }
      return best;
    }
    scrollCol.addEventListener('scroll', () => {
      const idx = getActiveIndex();
      if (idx === activeIndex) return;
      activeIndex = idx;
      if (idx === -1) {
        descs.forEach(d => d.classList.remove('is-visible'));
        intro.classList.add('is-visible');
        introGone = false;
        return;
      }
      if (!introGone) { intro.classList.remove('is-visible'); introGone = true; }
      showDesc(blocks[idx].id);
    }, { passive: true });

    const HEADER_OFFSET = 80;
    function scrollToBlock(idx) {
      if (idx < 0 || idx >= blocks.length) return;
      scrollCol.scrollTo({ top: blocks[idx].offsetTop - HEADER_OFFSET, behavior: 'smooth' });
    }

    arrowDown.addEventListener('click', () => {
      if (activeIndex === -1) {
        intro.classList.remove('is-visible');
        introGone = true;
        activeIndex = 0;
        showDesc(blocks[0].id);
      } else {
        const next = activeIndex < blocks.length - 1 ? activeIndex + 1 : 0;
        scrollToBlock(next);
      }
    });

        /* ══ OVERLAY MOBILE ══ */
    const mOverlay        = document.getElementById('m-overlay');
    const mOverlayContent = document.getElementById('m-overlay-content');
    const mOverlayClose   = document.getElementById('m-overlay-close');

    function openOverlay(builder) {
      mOverlayContent.innerHTML = '';
      builder(mOverlayContent);
      mOverlay.classList.add('visible');
    }
    function closeOverlay() {
      mOverlay.classList.remove('visible');
    }

    mOverlayClose.addEventListener('click', () => {
      if (infosMode) exitInfos();
      else if (drawMode) exitDraw();
    });

    /* 👇 NOUVEAU : fermer en tapant en dehors du contenu */
    mOverlay.addEventListener('click', e => {
      if (e.target.closest('#m-overlay-content')) return;
      if (e.target.closest('#m-overlay-topbar')) return;
      if (infosMode) exitInfos();
      else if (drawMode) exitDraw();
    });


    /* ══ INFOS ══ */
    const btnInfos   = document.getElementById('btn-infos');
    const infosPanel = document.getElementById('infos-panel');
    let infosMode    = false;

    function buildInfosContent(container) {
      const p = document.createElement('p');
      p.className = 'infos-text';
      p.innerHTML = translations.intro[lang];
      container.appendChild(p);
      const c = document.createElement('div');
      c.className = 'infos-contact';
      c.innerHTML = '<p>+33 6 52 54 91 24<br>emilioavignon@gmail.com<br>@emilioavignon</p>';
      container.appendChild(c);
    }

    function enterInfos() {
      if (drawMode) exitDraw();
      infosMode = true;
      document.body.classList.add('infos-active');
      btnInfos.classList.add('active');
      if (isMobile()) {
        openOverlay(buildInfosContent);
      } else {
        descs.forEach(d => d.classList.add('draw-hidden'));
        infosPanel.classList.add('visible');
        document.getElementById('infos-bio').innerHTML = translations.intro[lang];
      }
    }
    function exitInfos() {
      infosMode = false;
      document.body.classList.remove('infos-active');
      btnInfos.classList.remove('active');
      if (isMobile()) {
        closeOverlay();
      } else {
        descs.forEach(d => d.classList.remove('draw-hidden'));
        infosPanel.classList.remove('visible');
      }
    }
    btnInfos.addEventListener('click', () => infosMode ? exitInfos() : enterInfos());

    /* ══ DESSIN ══ */
    const btnDraw    = document.getElementById('btn-draw');
    const btnClose   = document.getElementById('btn-close');
    const drawPanel  = document.getElementById('draw-panel');
    const btnClear   = document.getElementById('btn-clear');
    const toolPen    = document.getElementById('tool-pen');
    const toolEraser = document.getElementById('tool-eraser');
    const sizeSlider = document.getElementById('size-slider');
    const colorSlider= document.getElementById('color-slider');
    const cursorSvg  = document.getElementById('draw-cursor');
    const cursorCirc = document.getElementById('cursor-circle');
    const layout     = document.getElementById('main-layout');

    const canvas = document.createElement('canvas');
    canvas.id = 'draw-canvas';
    scrollCol.insertBefore(canvas, scrollCol.firstChild);
    const ctx = canvas.getContext('2d');

    let drawMode  = false;
    let isErasing = false;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let brushSize = 2;
    let drawColor = 'hsl(0,100%,45%)';

    const strokes = [];
    let currentStroke = null;

    const norm   = p => ({ x: p.x / canvas.width,  y: p.y / canvas.height });
    const denorm = p => ({ x: p.x * canvas.width,   y: p.y * canvas.height });

    function redrawAll() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of strokes) {
        if (s.points.length < 2) continue;
        ctx.beginPath();
        const p0 = denorm(s.points[0]);
        ctx.moveTo(p0.x, p0.y);
        for (let i = 1; i < s.points.length; i++) {
          const p = denorm(s.points[i]);
          ctx.lineTo(p.x, p.y);
        }
        ctx.globalCompositeOperation = s.erasing ? 'destination-out' : 'source-over';
        ctx.strokeStyle = s.erasing ? 'rgba(0,0,0,1)' : s.color;
        ctx.lineWidth   = s.size * canvas.width;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.stroke();
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    function resizeCanvas() {
      const nw = scrollCol.scrollWidth, nh = scrollCol.scrollHeight;
      if (nw === canvas.width && nh === canvas.height) return;
      canvas.width  = nw;
      canvas.height = nh;
      redrawAll();
    }

    function updateCursor() {
      const r   = brushSize / 2;
      const box = Math.max(brushSize + 4, 12);
      cursorSvg.setAttribute('width',   box);
      cursorSvg.setAttribute('height',  box);
      cursorSvg.setAttribute('viewBox', `0 0 ${box} ${box}`);
      cursorCirc.setAttribute('cx', box / 2);
      cursorCirc.setAttribute('cy', box / 2);
      cursorCirc.setAttribute('r',  r);
      cursorCirc.setAttribute('stroke', isErasing ? '#888' : drawColor);
      cursorCirc.setAttribute('stroke-dasharray', isErasing ? '2 2' : 'none');
    }

    document.addEventListener('mousemove', e => {
      if (!drawMode) return;
      cursorSvg.style.left = e.clientX + 'px';
      cursorSvg.style.top  = e.clientY + 'px';
    });

    function getPos(e) {
      const rect = scrollCol.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: cx - rect.left, y: cy - rect.top + scrollCol.scrollTop };
    }

    function stroke(p) {
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.globalCompositeOperation = isErasing ? 'destination-out' : 'source-over';
      ctx.strokeStyle = isErasing ? 'rgba(0,0,0,1)' : drawColor;
      ctx.lineWidth   = brushSize;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.stroke();
      lastX = p.x; lastY = p.y;
      if (currentStroke) currentStroke.points.push(norm(p));
    }

    function startStroke(p) {
      isDrawing = true;
      lastX = p.x; lastY = p.y;
      currentStroke = { erasing: isErasing, color: drawColor, size: brushSize / canvas.width, points: [norm(p)] };
      strokes.push(currentStroke);
    }
    function endStroke() { isDrawing = false; currentStroke = null; }

    canvas.addEventListener('mousedown',  e => startStroke(getPos(e)));
    canvas.addEventListener('mousemove',  e => { if (isDrawing) stroke(getPos(e)); });
    canvas.addEventListener('mouseup',    endStroke);
    canvas.addEventListener('mouseleave', endStroke);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); startStroke(getPos(e)); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (isDrawing) stroke(getPos(e)); }, { passive: false });
    canvas.addEventListener('touchend',   endStroke);

    /* Référence "maison" du draw-panel dans la col-right */
    const drawPanelHome = drawPanel.parentNode;
    function restoreDrawPanel() {
      if (drawPanel.parentNode !== drawPanelHome) drawPanelHome.appendChild(drawPanel);
    }

    function buildDrawContent(container) {
      /* Déplace le draw-panel (avec ses listeners) dans l'overlay */
      container.appendChild(drawPanel);
    }

    function enterDraw() {
      if (infosMode) exitInfos();
      drawMode = true;
      document.body.classList.add('drawing-active');
      scrollCol.classList.add('drawing');
      layout.classList.add('grayscale');
      btnDraw.classList.add('active');
      resizeCanvas();
      sizeSlider.value = brushSize;
      updateCursor();
      if (isMobile()) {
        openOverlay(buildDrawContent);
      } else {
        descs.forEach(d => d.classList.add('draw-hidden'));
        drawPanel.classList.add('visible');
      }
    }
    function exitDraw() {
      drawMode = false;
      document.body.classList.remove('drawing-active');
      scrollCol.classList.remove('drawing');
      layout.classList.remove('grayscale');
      btnDraw.classList.remove('active');
      ctx.globalCompositeOperation = 'source-over';
      if (isMobile()) {
        closeOverlay();
        setTimeout(restoreDrawPanel, 460);
      } else {
        descs.forEach(d => d.classList.remove('draw-hidden'));
        drawPanel.classList.remove('visible');
      }
    }

    btnDraw.addEventListener('click',  () => drawMode  ? exitDraw()  : enterDraw());
    btnClose.addEventListener('click', () => infosMode ? exitInfos() : exitDraw());

    toolPen.addEventListener('click', () => {
      isErasing = false;
      toolPen.classList.add('active');
      toolEraser.classList.remove('active');
      updateCursor();
    });
    toolEraser.addEventListener('click', () => {
      isErasing = true;
      toolEraser.classList.add('active');
      toolPen.classList.remove('active');
      updateCursor();
    });

    sizeSlider.addEventListener('input', () => {
      brushSize = +sizeSlider.value;
      updateCursor();
    });

    colorSlider.addEventListener('input', () => {
      const h = +colorSlider.value;
      drawColor = `hsl(${h},100%,45%)`;
      colorSlider.style.setProperty('--thumb-color', drawColor);
      if (isErasing) { isErasing = false; toolPen.classList.add('active'); toolEraser.classList.remove('active'); }
      updateCursor();
    });

    btnClear.addEventListener('click', () => {
      strokes.length = 0;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    /* ══ PANNEAU MOBILE PROJET ══ */
    const mPanel    = document.getElementById('m-panel');
    const mTitlebar = document.getElementById('m-titlebar');
    const mTitle    = document.getElementById('m-title');
    const mBtn      = document.getElementById('m-btn');
    const mDesc     = document.getElementById('m-desc');
    let mCurrentId  = null;

    if (isMobile()) {
      function getMobileActiveId() {
        const triggerY = scrollCol.getBoundingClientRect().top + scrollCol.clientHeight * 0.35;
        let best = null;
        for (const b of blocks) {
          if (b.getBoundingClientRect().top <= triggerY) best = b.id;
        }
        return best;
      }

      function mClose() { mPanel.classList.remove('open'); mBtn.textContent = '↓'; }
      function mOpen()  { mPanel.classList.add('open');    mBtn.textContent = '✕'; }

      function mSetProject(id) {
        if (id === mCurrentId) return;
        mCurrentId = id;
        mClose();
        if (!id) { mTitle.textContent = ''; mTitle.classList.remove('visible'); mDesc.innerHTML = ''; return; }
        const t = translations[id];
        if (!t) return;
        mTitle.textContent = t.title || '';
        mTitle.classList.add('visible');
        const curLang = window.lang || 'fr';
        let html = '';
        if (t.meta?.[curLang]) html += `<div class="m-meta">${t.meta[curLang]}</div>`;
        if (t[curLang])        html += `<p>${t[curLang]}</p>`;
        mDesc.innerHTML = html;
      }

      mTitlebar.addEventListener('click', () => mPanel.classList.contains('open') ? mClose() : mOpen());
      document.addEventListener('click', e => {
        if (mPanel.classList.contains('open') && !mPanel.contains(e.target) && !mOverlay.contains(e.target)) mClose();
      });

      let mLastId = null;
      scrollCol.addEventListener('scroll', () => {
        const id = getMobileActiveId();
        if (id !== mLastId) { mLastId = id; mSetProject(id); }
      }, { passive: true });

      mBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (mPanel.classList.contains('open')) { mClose(); return; }
        const idx  = blocks.findIndex(b => b.id === mCurrentId);
        const next = idx < blocks.length - 1 ? idx + 1 : 0;
        scrollCol.scrollTo({ top: blocks[next].offsetTop - 80, behavior: 'smooth' });
      });

      /* Init : affiche directement le premier projet */
      intro.classList.remove('is-visible');
      introGone   = true;
      activeIndex = 0;
      mLastId     = blocks[0].id;
      mSetProject(blocks[0].id);
    }
  </script>

</body>
</html>
